<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RainPulse</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;margin:12px;width:300px;background:#0b1220;color:#e5e7eb}
    h1{font-size:16px;margin:0 0 8px}
    .row{margin:8px 0}
    input{width:100%;padding:8px;border-radius:8px;border:1px solid #334155;background:#111827;color:#e5e7eb}
    button{padding:8px 10px;border:0;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
    .muted{opacity:.8;font-size:12px}
    #results button{display:block;width:100%;text-align:left;margin:6px 0;background:#1f2937}
    .status{padding:8px;border-radius:8px;background:#111827;font-size:13px;line-height:1.3}
  </style>
</head>
<body>
  <h1>RainPulse Nowcast</h1>
  <div class="row">
    <input id="q" placeholder="Search city (e.g. Seoul)" />
  </div>
  <div class="row"><button id="search">Search</button></div>
  <div id="results"></div>
  <div class="row status" id="status">Loading...</div>
  <div class="row muted">Badge: Rxx = rain starts in xx min, Exx = rain ends in xx min</div>
  <div class="row"><button id="refresh">Refresh now</button></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
